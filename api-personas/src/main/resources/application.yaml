server:
  port: 8081
  servlet:
    context-path: /api-personas

spring:
  application:
    name: api-personas
  datasource:
    url: jdbc:postgresql://localhost:5432/db-fintech
    username: postgres
    password: postgres
    driverClassName: org.postgresql.Driver
  jpa:
   show-sql: true
   database: POSTGRESQL
   hibernate:
    ddl-auto: validate
  kafka:
    bootstrap-servers: localhost:29092

app:
  kafka:
    topic:
      clientes: clientes-eventos
