services:
  db:
    build:
      context: ./scripts-db
      dockerfile: Dockerfile
    container_name: db-fintech
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db-fintech-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-transaccional:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-transaccional
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/db-fintech
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${APP_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-fintech-data:
