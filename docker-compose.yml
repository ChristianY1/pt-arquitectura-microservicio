services:
  db-personas:
    build:
      context: ./scripts-db/personas
      dockerfile: Dockerfile
    container_name: db-personas
    environment:
      POSTGRES_DB: ${POSTGRES_DB_PERSONAS}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PERSONAS_PORT}:5432"
    volumes:
      - db-personas-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_PERSONAS}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-transaccional:
    build:
      context: ./scripts-db/transaccional
      dockerfile: Dockerfile
    container_name: db-transaccional
    environment:
      POSTGRES_DB: ${POSTGRES_DB_TRANSACCIONAL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_TRANSACCIONAL_PORT}:5432"
    volumes:
      - db-transaccional-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_TRANSACCIONAL}"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "${KAFKA_PORT}:29092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  api-transaccional:
    build:
      context: .
      dockerfile: api-transaccional/Dockerfile
    container_name: api-transaccional
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-transaccional:5432/${POSTGRES_DB_TRANSACCIONAL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${APP_PORT}:8080"
    depends_on:
      db-transaccional:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-personas:
    build:
      context: .
      dockerfile: api-personas/Dockerfile
    container_name: api-personas
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-personas:5432/${POSTGRES_DB_PERSONAS}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${PERSONAS_APP_PORT}:8081"
    depends_on:
      db-personas:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  db-personas-data:
  db-transaccional-data:
