trigger:
- main
- feature-despliegue-azure

pool:
  vmImage: ubuntu-latest

# API-PERSONAS
steps:
- script: |
    POSTGRES_DB_PERSONAS=db-personas \
    POSTGRES_USER=postgres \
    POSTGRES_PASSWORD=postgres \
    DB_PERSONAS_PORT=5432 \
    docker compose up -d --wait db-personas
  displayName: "Levantar base de datos db-personas"

- script: chmod +x ./mvnw
  workingDirectory: api-personas
  displayName: "dar permisos de ejecucion a mvnw"

- script: ./mvnw test
  workingDirectory: api-personas
  displayName: "Build y test de api-personas"


# API-TRANSACCIONAL
- script: |
    POSTGRES_DB_TRANSACCIONAL=db-transaccional \
    POSTGRES_USER=postgres \
    POSTGRES_PASSWORD=postgres \
    DB_TRANSACCIONAL_PORT=5432 \
    KAFKA_PORT=29092 \
    docker compose up -d --wait db-transaccional kafka
  displayName: "Levantar base de datos db-transaccional"


- script: chmod +x ./mvnw
  workingDirectory: api-transaccional
  displayName: "dar permisos de ejecucion a mvnw"

- script: ./mvnw test
  workingDirectory: api-transaccional
  displayName: "Build y test de api-transaccional"



